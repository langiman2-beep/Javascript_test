<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Урок №5</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Завдання 5</h1>
    <div class="bike-container">
      <svg
        xmlns="http://w3.org"
        viewBox="0 0 500 350"
        width="100%"
        height="100%"
      >
        <!-- ТЕЛО И МОТОЦИКЛ (Оно стоит на месте) -->
        <g id="langoust-and-motorcycle">
          <path
            d="M 140 240 L 220 240 L 300 150 L 320 150"
            stroke="#222"
            stroke-width="10"
            stroke-linecap="round"
            fill="none"
          />
          <path
            d="M 220 240 L 250 140 L 340 110"
            stroke="#222"
            stroke-width="8"
            stroke-linecap="round"
            fill="none"
          />
          <rect x="180" y="200" width="60" height="40" rx="10" fill="#555" />
          <path
            d="M 150 210 Q 110 210 100 240 Q 120 250 150 220"
            fill="#cc3300"
            stroke="#990000"
            stroke-width="2"
          />
          <path d="M 170 210 Q 140 190 190 220" fill="#E63900" />
          <path
            d="M 180 220 Q 210 110 260 140 Q 280 180 230 230 Z"
            fill="#FF4500"
            stroke="#B33000"
            stroke-width="3"
          />
          <circle cx="210" cy="160" r="4" fill="#FFD700" />
          <circle cx="220" cy="150" r="3" fill="#FFD700" />
          <circle cx="215" cy="180" r="5" fill="#FFD700" />
          <circle cx="230" cy="170" r="4" fill="#FFD700" />
          <circle cx="200" cy="185" r="3" fill="#FFD700" />
          <path
            d="M 250 120 Q 270 90 280 130 Q 270 150 245 135 Z"
            fill="#FF4500"
          />
          <circle
            cx="265"
            cy="115"
            r="10"
            fill="#fff"
            stroke="#333"
            stroke-width="2"
          />
          <circle cx="268" cy="115" r="5" fill="#000" />
          <circle cx="266" cy="113" r="2" fill="#fff" />
          <path
            d="M 260 135 Q 275 140 280 128"
            stroke="#000"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
          />
          <path d="M 260 135 Q 270 150 278 132 Z" fill="#990000" />
          <path
            d="M 275 105 Q 240 40 140 40"
            stroke="#FF4500"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M 270 100 Q 230 50 160 55"
            stroke="#FF4500"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M 240 160 Q 280 150 325 120"
            stroke="#FF4500"
            stroke-width="8"
            stroke-linecap="round"
            fill="none"
          />
          <path
            d="M 230 180 Q 270 170 320 125"
            stroke="#FF4500"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"
          />
        </g>

        <!-- ЗАДНЕЕ КОЛЕСО (Крутится через CSS) -->
        <g id="rear-wheel">
          <circle
            cx="140"
            cy="240"
            r="40"
            stroke="#333"
            stroke-width="12"
            fill="none"
          />
          <line
            x1="140"
            y1="200"
            x2="140"
            y2="280"
            stroke="#FFD700"
            stroke-width="6"
          />
          <line
            x1="100"
            y1="240"
            x2="180"
            y2="240"
            stroke="#FFD700"
            stroke-width="6"
          />
          <circle cx="140" cy="240" r="8" fill="#555" />
        </g>

        <!-- ПЕРЕДНЕЕ КОЛЕСО (Крутится через CSS) -->
        <g id="front-wheel">
          <circle
            cx="340"
            cy="240"
            r="40"
            stroke="#333"
            stroke-width="12"
            fill="none"
          />
          <line
            x1="340"
            y1="200"
            x2="340"
            y2="280"
            stroke="#FFD700"
            stroke-width="6"
          />
          <line
            x1="300"
            y1="240"
            x2="380"
            y2="240"
            stroke="#FFD700"
            stroke-width="6"
          />
          <circle cx="340" cy="240" r="8" fill="#555" />
        </g>
      </svg>
    </div>

    <button id="html-btn">Що таке HTML?</button>
    <button id="css-btn">Що таке CSS?</button>
    <script src="./5-lesson.js"></script>
  </body>
</html>
